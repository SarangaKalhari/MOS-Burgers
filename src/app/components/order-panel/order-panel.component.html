<div class="bg-gray-100 flex flex-col h-full orderPanel">

    <!-- Header -->
    <div class="p-4">
        <h5 class="text-lg font-semibold">Order Details</h5>
        <hr class="my-2">
    </div>

    <!-- Items -->
    <div class="flex-1 overflow-auto px-4">

        @if(cartItems.length > 0){

        @for(item of cartItems; track item.id){

        <div
            class="flex items-center justify-between gap-3 p-3 rounded-xl bg-white shadow-sm hover:shadow-md transition-all duration-200 m-1">

            <!-- Image -->
            <img [src]="item.image" [alt]="item.title" class="w-14 h-14 object-cover rounded-lg " />

            <!-- Item Info -->
            <div class="flex-1">
                <p class="font-semibold text-gray-800 text-sm">
                    {{ item.title }}
                </p>

                <p class="text-xs text-gray-500 mt-1">
                    Rs {{ item.price | number: '1.2-2'}} × {{ item.qty }}
                </p>
            </div>

            <!-- Total Price -->
            <div class="text-sm font-semibold text-gray-900">
                Rs {{ item.price * item.qty }}
            </div>

            <!-- Remove Button -->
            <button (click)="removeItem(item)"
                class="ml-2 flex items-center justify-center w-8 h-8 rounded-full border border-red-500 text-red-500 hover:bg-red-500 hover:text-white transition duration-200">
                ✕
            </button>

        </div>
        }

        } @else {

        <p class="text-gray-400 text-center mt-4">
            No items added
        </p>

        }

    </div>

    <!-- Bottom -->
    <div class="p-4 border-t">

        <h6 class="font-semibold">
            Total: Rs {{ getTotal() | number:'1.2-2'}}
        </h6>

        <!-- <button class="bg-yellow-400 hover:bg-yellow-500 w-full mt-2 py-2 rounded font-semibold" (click)="proceedPayment()">
            Proceed Payment
        </button> -->

        <button class="bn632-hover bn18 w-full font-semibold m-2" (click)="proceedPayment()">Proceed Payment</button>

    </div>

</div>
