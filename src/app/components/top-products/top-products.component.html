<div class="flex flex-col">
  <div class="overflow-x-auto sm:-mx-6 lg:-mx-8">
    <div class="py-2 inline-block min-w-full sm:px-6 lg:px-8">
      <div class="overflow-hidden shadow-lg rounded-lg">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50 sticky top-0">
            <tr>
              <th scope="col" class="text-sm font-bold text-gray-700 px-6 py-3 text-left">#</th>
              <th scope="col" class="text-sm font-bold text-gray-700 px-6 py-3 text-left">Item Code</th>
              <th scope="col" class="text-sm font-bold text-gray-700 px-6 py-3 text-left">Total Sold</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200">
            <tr *ngFor="let product of products; let i = index; trackBy: trackByCode" 
                class="hover:bg-gray-100 transition-colors duration-200">
              <td class="px-6 py-4 text-sm font-semibold text-gray-900">{{ i + 1 }}</td>
              <td class="px-6 py-4 text-sm text-gray-800">{{ product.itemCode }}</td>
              <td class="px-6 py-4 text-sm text-gray-800">{{ product.totalSold }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
