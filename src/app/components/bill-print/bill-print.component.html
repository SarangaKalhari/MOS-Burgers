<!-- Background Overlay -->
<div class="fixed inset-0 bg-black/50 flex justify-center items-center z-50">

  <!-- Bill Container -->
  <div class="bg-white rounded-xl shadow-xl p-5">

    <!-- Header -->
    <div class="text-center border-b pb-2 mb-3">
      <h2 class="text-xl font-bold">Burger Shop</h2>
      <p class="text-sm text-gray-500">Payment Bill</p>
    </div>

    <!-- Order Items -->
    <div class=" overflow-auto mb-3">

      <!-- Sample Item Row -->
      <!-- Later you can loop items using *ngFor -->
      <div class="flex justify-between text-sm mb-1">
        <span>Chicken Burger</span>
        <span>Rs. 800</span>
      </div>

      <div class="flex justify-between text-sm mb-1">
        <span>Cheese Burger</span>
        <span>Rs. 900</span>
      </div>

    </div>

    <!-- Divider -->
    <div class="border-t pt-2 mb-3"></div>

    <!-- Total -->
    <div class="flex justify-between font-bold text-lg">
      <span>Total</span>
      <span class="text-green-600">Rs. {{ total }}</span>
    </div>

    <!-- Buttons -->
    <div class="flex gap-2 mt-4">

      <button class="flex-1 bg-green-600 text-white py-2 rounded-lg" (click)="printBill()">
        Print
      </button>

      <button class="flex-1 bg-red-500 text-white py-2 rounded-lg" (click)="close()">
        Close
      </button>


    </div>

  </div>

</div>
