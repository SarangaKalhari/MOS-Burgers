<!-- SMALL CARD -->


<div class="p-1 ">

    <div class="full-card rounded-lg shadow flex flex-col h-full">

        <img src="{{items.image}}" alt="{{items.title}}" class="w-full h-35 object-contain p-2">

        <div class="flex flex-col p-2">

            <h3 class="text-center text-sm font-semibold">
                {{items.title}}
            </h3>

            <!-- Price + Qty Line -->
            <div class="flex justify-between items-center my-2">

                <!-- Price -->
                <h6 class="text-sm text-center font-semibold">
                    Rs. <span>{{items.price}}</span>
                </h6>

                 <h6>{{items.stock}}</h6>
                 
                <!-- Qty Controls -->
                <div class="flex items-center gap-1">

                    <button class="border border-gray-300 px-2 py-0.5 text-sm rounded hover:bg-gray-100"
                        (click)="decreaseQty()">
                        −
                    </button>

                    <div class="font-semibold text-sm qty">{{qty}}</div>

                    <button class="border border-gray-300 px-2 py-0.5 text-sm rounded hover:bg-gray-100"
                        (click)="increaseQty()">
                        +
                    </button>

                    

                </div>

            </div>

           

            <!-- <button class=" bg-gray-500 text-white text-sm w-full mt-auto py-1.5 rounded hover:bg-black"
                (click)="addToCart()">
                Add
            </button> -->

                <button class="bn632-hover bn25" [disabled]="items.stock === 0" (click)="addToCart(items)">Add</button>


        </div>

    </div>

</div>
