<!-- SMALL CARD -->


 
<div class="p-1">

    <div class="full-card rounded-lg shadow flex flex-col h-full">

        <img src="{{burger?.image}}" alt="{{burger?.title}}"
             class="w-full h-28 object-contain p-2">

        <div class="flex flex-col p-2">

            <h6 class="text-center text-sm font-semibold">
                {{burger?.title}}
            </h6>

            <!-- Price + Qty Line -->
            <div class="flex justify-between items-center my-2">

                <!-- Price -->
                <h6 class="text-sm font-semibold">
                    Rs. <span>{{burger?.price}}</span>
                </h6>

                <!-- Qty Controls -->
                <div class="flex items-center gap-1">
                    
                    <button 
                        class="border border-gray-300 px-2 py-0.5 text-sm rounded hover:bg-gray-100"
                        onclick="decreaseQty(this)">
                        −
                    </button>

                    <span class="font-semibold text-sm qty">1</span>

                    <button 
                        class="border border-gray-300 px-2 py-0.5 text-sm rounded hover:bg-gray-100"
                        onclick="increaseQty(this)">
                        +
                    </button>

                </div>

            </div>

            <button 
                class="bg-gray-900 text-white text-sm w-full mt-auto py-1.5 rounded hover:bg-black"
                onclick="addToCart(this)">
                Add
            </button>

        </div>

    </div>

</div>
