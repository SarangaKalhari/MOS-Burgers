<body class=" font-sans grid grid-cols-1 lg:grid-cols-12 h-screen">

    <!-- Sidebar -->
    <div class=" lg:col-span-1 h-screen">
        <app-side-bar></app-side-bar>
    </div>


    <!-- Main Content -->
    <div class="flex flex-col lg:col-span-8 h-full  w-full overflow-hidden p-4">

        <app-search-bar></app-search-bar>

        <div class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-4">
            @for(button of buttons; track button.id){
                <app-nav-bar [button]="button"></app-nav-bar>
            }
        </div>

        <!-- Card Section -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mt-4 overflow-auto">
            @for(burger of burgers; track burger.id){
            <app-card [burger]="burger"></app-card>
            }
        </div>

    </div>


    <!-- Order Panel -->
    <div class="lg:col-span-3 h-full overflow-auto">
        <app-order-panel></app-order-panel>
    </div>

</body>
